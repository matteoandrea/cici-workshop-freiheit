name: CI
run-name: ${{ github.actor }} is running the CI 🚀
on:
    # Triggered on every pull request targeting the main branch.
    # Ensures code is validated before it can be merged.
    pull_request:
      branches: [ "main" ]

jobs:
    build-lint-test:
        runs-on: ubuntu-latest
        steps:
          # Checks out the repository so the workflow has access to the source code.
          - name: Check out repository code 
            uses: actions/checkout@v4
          
          # Sets up Flutter in the runner environment using the latest stable channel.
          - name: Setup Flutter 
            uses: subosito/flutter-action@v2
            with:
              channel: 'stable'
          
          # Fetches and installs all dependencies declared in pubspec.yaml.
          - name: Install dependencies
            run: flutter pub get
          
          # Checks that all Dart files follow the official style guide.
          # Fails the pipeline if any file is not correctly formatted.
          - name: Verify formatting
            run: dart format --output=none --set-exit-if-changed .
          
          # Runs the Dart/Flutter static analyzer to catch potential bugs and enforce best practices.
          - name: Analyze project source
            run: flutter analyze

          # Compiles the Flutter app as a web application.
          # Fails the pipeline if the build does not compile successfully.
          - name: Build flutter app for web
            run: flutter build web